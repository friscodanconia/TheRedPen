<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 280px;
      margin: 0;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #FDFBF7;
      color: #2D2A26;
    }
    h1 {
      font-family: Georgia, serif;
      font-size: 18px;
      margin: 0 0 4px;
    }
    p {
      font-size: 13px;
      color: #6B6560;
      margin: 0 0 16px;
      line-height: 1.4;
    }
    .status {
      font-size: 12px;
      padding: 8px 12px;
      background: rgba(91, 138, 106, 0.1);
      border-radius: 8px;
      color: #3d6e4d;
      text-align: center;
    }
    a {
      color: #8B6E4E;
    }
    .footer {
      margin-top: 16px;
      font-size: 11px;
      color: #9B9590;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>The Red Pen</h1>
  <p>AI writing patterns are detected in real-time as you compose LinkedIn posts. Look for the score badge in the editor.</p>
  <div class="status">Active on linkedin.com</div>
  <div class="footer">
    All analysis runs locally.<br>
    Your text never leaves your browser.
  </div>
</body>
</html>
